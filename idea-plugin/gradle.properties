# NOTE on the "single-use Daemon process will be forked" notice:
# It comes from the GLOBAL config at %GRADLE_USER_HOME%\gradle.properties
# (here: D:\gradle-8.10.2\.gradle) which sets `org.gradle.daemon=false`.
# A project-level daemon=true cannot override the global file, so to avoid the
# fork + notice, invoke gradle with `--daemon` on the command line (highest
# precedence), e.g. `gradle test --daemon`.

# Quieter, faster local builds.
org.gradle.caching=true
org.gradle.configureondemand=true
kotlin.stdlib.default.dependency=false
